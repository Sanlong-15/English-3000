<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="The 3000 most common English words with simple definitions, Khmer translations, CEFR levels, example sentences and speech.">
<meta name="author" content="Koko">
<title>3000 Common English Words</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>3000 Common English Words</h1>
  <div class="sub">Simple meaning · Khmer · part of speech · CEFR level · one example per level ·
    tap <b>&#9679;</b> to hear a word or sentence</div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search a word or meaning…" autocomplete="off">
    <div class="dd" id="ddGrp"></div>
    <div class="dd" id="ddLvl"></div>
    <div class="dd" id="ddPos"></div>
    <button id="mode">Flashcards</button>
    <button id="slow" title="Speak more slowly">Slow</button>
    <span class="count" id="count"></span>
  </div>
</header>

<main>
  <div id="list"></div>

  <div id="fc">
    <div class="num" id="fcn"></div>
    <div id="fcw"></div>
    <div class="tag" id="fcp"></div>
    <button class="say" id="fcsay" title="Hear this word"></button>
    <div id="fcb" class="hide">
      <div class="def" id="fcd"></div>
      <div class="kh" id="fck"></div>
      <ul id="fce"></ul>
    </div>
    <div class="fcnav">
      <button onclick="prev()">&#8592; Back</button>
      <button onclick="flip()" id="flipb">Show meaning</button>
      <button onclick="next()">Next &#8594;</button>
    </div>
  </div>
</main>

<!--
  Load order matters:
    data.js      defines DATA    - needed by app.js
    speech.js    defines say()   - needed by app.js
    dropdown.js  defines makeDD() - needed by app.js
    app.js       uses all of the above, then renders
-->
<script src="js/data.js"></script>
<script src="js/speech.js"></script>
<script src="js/dropdown.js"></script>
<script src="js/app.js"></script>

</body>
</html>
